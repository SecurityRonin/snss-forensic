# Allow `unwrap()`/`expect()` inside test functions and `#[cfg(test)]` modules.
# Production code keeps `clippy::unwrap_used = deny` (see workspace Cargo.toml);
# tests legitimately unwrap to fail loudly, so this is the upstream-recommended
# exception rather than scattering `#[allow]` across every test module.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Product / format / SNSS-command names that look like code identifiers to
# clippy::doc_markdown. Keeps doc comments prose-clean without backtick-wrapping
# every name.
doc-valid-idents = [
    "SNSS", "Chromium", "Brave", "Pickle", "base::Pickle", "SessionID",
    "UpdateTabNavigation", "SetTabWindow", "TabIndexInWindow", "SetPinnedState",
    "LastActiveTime", "Session_", "Tabs_", "Apps_", "macOS", "DFIR", "..",
    "SHA-256", "MD5",
]
